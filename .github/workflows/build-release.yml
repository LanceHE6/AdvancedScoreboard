name: Build & Release Mod

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build mod
        run: ./gradlew build --no-daemon

      - name: Read mod version
        id: get_version
        run: |
          VERSION=$(grep -oP 'mod_version=\K.+' gradle.properties)
          MC_VERSION=$(grep -oP 'minecraft_version=\K.+' gradle.properties)
          echo "MOD_VERSION=$VERSION" >> $GITHUB_ENV
          echo "MC_VERSION=$MC_VERSION" >> $GITHUB_ENV

      - name: Rename JAR to standard format
        run: |
          cd build/libs
          mv *.jar AdvancedScoreboard-fabric-${{ env.MOD_VERSION }}-${{ env.MC_VERSION }}.jar

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdvancedScoreboard-fabric-${{ env.MOD_VERSION }}-${{ env.MC_VERSION }}
          path: build/libs/*.jar

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Read versions
        run: |
          echo "MOD_VERSION=$(grep -oP 'mod_version=\K.+' gradle.properties)" >> $GITHUB_ENV
          echo "MC_VERSION=$(grep -oP 'minecraft_version=\K.+' gradle.properties)" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: AdvancedScoreboard v${{ env.MOD_VERSION }} (MC ${{ env.MC_VERSION }})
          tag_name: ${{ github.ref_name }}
          files: ./**/*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}