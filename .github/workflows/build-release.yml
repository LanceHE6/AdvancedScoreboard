name: Build & Release (Multi-Branch)

# 1. 打 tag 自动触发
on:
  push:
    tags:
      - 'v*'

  # 2. 手动触发
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'all'
        type: choice
        options:
          - all      # 构建所有分支
          - single   # 构建指定分支
      branch:
        description: '单分支构建时填写分支名'
        required: false
        default: ''

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      branches: ${{ steps.get_branches.outputs.branches }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 获取仓库所有分支
        id: get_branches
        run: |
          # 获取所有远程分支，去掉 HEAD 指向，排序去重
          BRANCHES=$(git branch -r | grep -v '\->' | sed 's/origin\///' | sort -u | jq -R . | jq -cs .)
          echo "branches=$BRANCHES" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: ${{ fromJson(needs.prepare.outputs.branches) }}
      fail-fast: false # 不要因为一个分支失败就停止全部
    continue-on-error: true
    steps:
      - name: 过滤分支逻辑
        if: |
          (github.event.inputs.build_type == 'single' && github.event.inputs.branch == matrix.branch) ||
          (github.event.inputs.build_type == 'all') ||
          (github.event_name == 'push')
        run: echo "开始构建分支 ${{ matrix.branch }}"

      - name: Checkout 分支 ${{ matrix.branch }}
        if: success()
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 1

      - name: Set up JDK 21
        if: success()
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        if: success()
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        if: success()
        run: gradle build --no-daemon

      - name: 读取版本号
        id: version
        run: |
          MOD_VER=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)
          MC_VER=$(grep '^minecraft_version=' gradle.properties | cut -d'=' -f2)
          echo "MOD_VERSION=$MOD_VER" >> $GITHUB_ENV
          echo "MC_VERSION=$MC_VER" >> $GITHUB_ENV
          echo "mod_version=$MOD_VER" >> $GITHUB_OUTPUT
          echo "mc_version=$MC_VER" >> $GITHUB_OUTPUT

      - name: 重命名 JAR
        run: |
          cd build/libs
          rm -f *-sources.jar
          # 命名规则：AdvancedScoreboard-fabric-模组版本-游戏版本.jar
          mv *.jar AdvancedScoreboard-fabric-${{ steps.version.outputs.mod_version }}-${{ steps.version.outputs.mc_version }}.jar

      - name: 上传构建产物 (${{ matrix.branch }})
        # 使用矩阵编号作为Artifact名字的一部分，确保唯一
        uses: actions/upload-artifact@v4
        with:
          name: jars-${{ matrix.branch }}-${{ github.run_id }}
          path: build/libs/AdvancedScoreboard-fabric-${{ steps.version.outputs.mod_version }}-${{ steps.version.outputs.mc_version }}.jar

  # 统一发布 Release
  release:
    needs: build
    runs-on: ubuntu-latest
    # 如果是手动触发 single 模式，只下载对应分支的产物
    steps:
      - uses: actions/checkout@v4

      - name: 确定下载的Artifact路径
        id: artifact_paths
        run: |
          if [[ "${{ github.event.inputs.build_type }}" == "single" && -n "${{ github.event.inputs.branch }}" ]]; then
            echo "PATH=jars-${{ github.event.inputs.branch }}-${{ github.run_id }}/*.jar" >> $GITHUB_ENV
          else
            echo "PATH=jars-*/${{ github.run_id }}/*.jar" >> $GITHUB_ENV
          fi

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: ./outputs/
          # 通配符匹配所有分支生成的 artifact
          pattern: jars-*
          merge-multiple: true

      - name: 列出下载文件
        run: ls -la ./outputs/

      - name: 获取模组版本
        run: |
          MOD_VER=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)
          echo "MOD_VERSION=$MOD_VER" >> $GITHUB_ENV

      - name: 创建 GitHub Release
        # 使用官方推荐的 create-release 动作，赋予写权限
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // 读取所有 jar 文件
            const files = fs.readdirSync('./outputs').filter(file => file.endsWith('.jar'));
            
            // 构建 release 名称
            const releaseName = `AdvancedScoreboard v${process.env.MOD_VERSION}`;
            
            // 准备上传资产
            const assets = files.map(file => ({
              name: file,
              path: `./outputs/${file}`
            }));
            
            // 创建 Release
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref || `v${process.env.MOD_VERSION}`,
              name: releaseName,
              draft: false,
              prerelease: false,
              generate_release_notes: true // 自动生成更新日志
            });
            
            // 上传资产
            for (const asset of assets) {
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: (await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag: context.ref || `v${process.env.MOD_VERSION}`
                })).data.id,
                name: asset.name,
                data: fs.readFileSync(asset.path)
              });
            }